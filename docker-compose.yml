version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dartbit
      POSTGRES_PASSWORD: dartbit_pass
      POSTGRES_DB: dartbit
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://dartbit:dartbit_pass@postgres:5432/dartbit
      JWT_SECRET: dartbit-super-secret-jwt-key
      PORT: 4000
      BACKEND_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
    ports:
      - '4000:4000'
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
